<!DOCTYPE html>
<html>
    <head>
        <style>
            h2 {
                font-family: Arial, sans-serif;
                color: #333;
                text-align: center;
            }

            tr {
                border: 1px solid #ccc;
            }

            table {
                width: 100%;
                border: 1px solid #444;
            }

            body {
                font-family: Arial, Helvetica, sans-serif;
                max-width: 300px;
                margin: 0 auto;
            }
            
            .submitbtn {
                text-align: center;
            }
        </style>
    </head>
    <h2>Create Account</h2>
    <table>
        <tr>
            <td><label for="first_name">First Name:</label><br>
            <input type="text" id="first_name" name="first_name"></td>
            <td><label for="last_name">Last Name:</label><br>
            <input type="text" id="last_name" name="last_name"></td>
        </tr>
        <tr>
            <td><label for="country">Country:</label><br>
            <select id="country" name="country">
                <option value="usa">Indonesia</option>
                <option value="canada">Japan</option>
                <option value="uk">United Kingdom</option>
                <option value="South Korea">South Korea</option>
                <option value="australia">Australia</option>
                <option value="China">China</option>
            </select></td>
        </tr>
        <tr>
            <td><label for="email">Email:</label><br>
            <input type="email" id="email" name="email"></td>
            <td><label for="phone">Phone Number:</label><br>
            <input type="tel" id="phone" name="phone"></td>
        </tr>
        <tr>
            <td><label for="password">Password:</label><br>
            <input type="password" id="password" name="password"></td>
            <td><label for="confirm_password">Confirm Password:</label><br>
            <input type="password" id="confirm_password" name="confirm_password"></td>
        </tr>
        <tr>
            <td><input type="checkbox" id="terms" name="terms"><label for="terms">Terms and Conditions</label></td>
        </tr>
        <tr class="submitbtn">
            <td colspan="2"><label for="create"></label><br>
            <input type="submit" id="create" name="create" value="Create"></td>
        </tr>
    </table>
</html>
